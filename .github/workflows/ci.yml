name: CI

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      # 3️⃣ Restaurar la solución completa
      - name: Restore dependencies
        run: dotnet restore asisya-server.slnx

      # 4️⃣ Construir la imagen Docker desde la carpeta Infrastructure
      - name: Build Docker image
        run: docker build -f Infrastructure/Dockerfile -t myapp:ci .

      # 5️⃣ Correr tests de xUnit apuntando al proyecto Test
      - name: Run xUnit Tests
        run: dotnet test Test/Test.csproj --logger "trx;LogFileName=test-results.trx"